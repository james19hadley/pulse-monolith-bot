<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Monolith</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0B1120',    /* Deep night sky / bg-slate-950 */
                            monolith: '#FF6B00', /* Glowing orange / text-orange-500 */
                            glow: '#FF8A33',
                            rock: '#1E293B',    /* Dark grey/blue for cards */
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0B1120;
            color: #E2E8F0;
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }
        
        .monolith-glow {
            box-shadow: 0 0 60px 10px rgba(255, 107, 0, 0.4);
        }
        
        .bg-gradient-radial {
            background-image: radial-gradient(circle at center, rgba(30, 41, 59, 0.8) 0%, rgba(11, 17, 32, 1) 100%);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-radial flex flex-col relative">

    <!-- Decorative Monolith Graphic in the background -->
    <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[150px] h-[600px] bg-gradient-to-b from-brand-glow to-brand-monolith opacity-20 blur-[80px] -z-10"></div>
    <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[80px] h-[400px] bg-brand-monolith rounded-sm monolith-glow -z-10 opacity-80 shadow-brand-glow mix-blend-screen"></div>

    <main class="flex-grow flex flex-col items-center justify-center p-6 text-center z-10">
        <h1 class="text-6xl md:text-8xl font-black tracking-tighter mb-4 text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-brand-monolith drop-shadow-lg">
            PULSE MONOLITH
        </h1>
        
        <p class="text-xl md:text-2xl text-slate-400 max-w-2xl mb-12 font-light leading-relaxed">
            Your single-tasking accountability engine. Strip away the noise, focus on the immediate next step, and build your life block by block.
        </p>

        <div class="bg-brand-rock/80 backdrop-blur-md p-8 rounded-2xl border border-slate-700/50 shadow-2xl flex flex-col items-center gap-6 max-w-md w-full">
            <h2 class="text-2xl font-bold text-slate-200">Enter the Void</h2>
            <p class="text-slate-400 text-sm">Authenticate via Telegram to access your Dashboard.</p>
            
            <!-- Telegram Login Widget -->
            <script async src="https://telegram.org/js/telegram-widget.js?22" 
                    data-telegram-login="{{ bot_username }}" 
                    data-size="large" 
                    data-auth-url="/auth/telegram" 
                    data-request-access="write">
            </script>
        </div>
    </main>

    <footer class="p-6 text-center text-slate-600 text-sm z-10">
        &copy; 2026 Pulse Monolith. System Operational.
    </footer>

</body>
</html>
