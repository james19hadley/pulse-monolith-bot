version: '3.8'

services:
  # 1. PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: pulse_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulsepass}
      POSTGRES_DB: ${POSTGRES_DB:-pulsedb}
    ports:
      - "5432:5432" # So you can connect to it locally via DBeaver/DataGrip
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulsedb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis Message Broker
  redis:
    image: redis:7-alpine
    container_name: pulse_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 3. Main Aiogram Bot
  bot:
    build: .
    container_name: pulse_bot
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pulse}:${POSTGRES_PASSWORD:-pulsepass}@db:5432/${POSTGRES_DB:-pulsedb}
      - REDIS_URL=redis://redis:6379/0
    command: python -m src.main

  # 4. Celery Worker
  worker:
    build: .
    container_name: pulse_worker
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pulse}:${POSTGRES_PASSWORD:-pulsepass}@db:5432/${POSTGRES_DB:-pulsedb}
      - REDIS_URL=redis://redis:6379/0
    command: celery -A src.worker worker -B --loglevel=info

  # 5. Caddy Web Server (For SSL/Webhooks)
  caddy:
    image: caddy:2-alpine
    container_name: pulse_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    environment:
      - WEBHOOK_DOMAIN=${WEBHOOK_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - bot

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
